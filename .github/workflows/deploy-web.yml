name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'questions.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

# Allow only one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

# GITHUB_TOKEN permissions needed for Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=web
        env:
          # Optional: override the API base at build time. Defaults to
          # https://api.quizeas.sinoficina.com in production builds (see
          # web/src/api/base.ts).
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
